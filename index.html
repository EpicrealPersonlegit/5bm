<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
    <title>BFDIA 5B</title>
    <style>
        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        html, body {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #player-wrapper {
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        ruffle-player { display: block; }

        #status {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            z-index: 999;
        }
    </style>
</head>
<body>

    <div id="status">Loading Ruffle...</div>
    <div id="player-wrapper"></div>

    <script>
        // ── Config ────────────────────────────────────────────────────────
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            base: "./",
            allowedNetworking: "all",
            scale: "showAll",
            letterbox: "on",
            quality: "high",
            wmode: "direct",
            contextMenu: false,
            allowFullscreen: false
        };

        var CDN_URL = "https://unpkg.com/@ruffle-rs/ruffle";
        var triedCDN = false;

        function setStatus(msg) {
            var el = document.getElementById("status");
            if (el) el.innerHTML = msg;
        }

        // ── Launch the SWF ────────────────────────────────────────────────
        function initRuffle() {
            try {
                var ruffle = window.RufflePlayer.newest();
                if (!ruffle) throw new Error("RufflePlayer.newest() returned null");

                var player = ruffle.createPlayer();
                var wrapper = document.getElementById("player-wrapper");
                wrapper.appendChild(player);

                // Hide status overlay once player is injected
                document.getElementById("status").style.display = "none";

                player.load("5mobile.swf").catch(function(e) {
                    setStatus("Failed to load 5mobile.swf.<br>" + e);
                });

            } catch(e) {
                // Ruffle loaded but crashed — fall back to CDN
                tryFromCDN("Ruffle init error: " + e);
            }
        }

        // ── Fallback: load Ruffle straight from CDN ───────────────────────
        function tryFromCDN(reason) {
            if (triedCDN) {
                setStatus("Ruffle failed to load from both local files and CDN.<br><br>" +
                          "Please check your internet connection and restart the app.<br><br>" +
                          "<small>" + reason + "</small>");
                return;
            }
            triedCDN = true;
            setStatus("Local Ruffle failed.<br>Fetching from official Ruffle CDN...<br><br>" +
                      "<small>" + reason + "</small>");

            // Override base so Ruffle finds its own wasm from CDN
            window.RufflePlayer.config.base = CDN_URL + "/";

            var s = document.createElement("script");
            s.src = CDN_URL;
            s.onload = function() {
                setStatus("CDN loaded. Launching...");
                // Small delay to let Ruffle fully register
                setTimeout(initRuffle, 500);
            };
            s.onerror = function() {
                setStatus("Ruffle CDN also failed.<br>" +
                          "Please check your internet connection and restart the app.");
            };
            document.head.appendChild(s);
        }

        // ── Load local Ruffle first ───────────────────────────────────────
        var localScript = document.createElement("script");
        localScript.src = "ruffle.js";
        localScript.onload = function() {
            setStatus("Local Ruffle loaded. Launching...");
            setTimeout(initRuffle, 300);
        };
        localScript.onerror = function() {
            tryFromCDN("ruffle.js not found locally");
        };
        document.head.appendChild(localScript);
    </script>

</body>
</html>
