<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
    <title>BFDIA 5B</title>
    <style>
        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        html, body {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
        }
        #player-wrapper {
            position: relative;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        ruffle-player {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ── Dpad overlay ─────────────────────────────────────────────── */
        #dpad {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* ── Countdown banner ─────────────────────────────────────────── */
        #drag-notice {
            display: none;
            position: fixed;
            top: 8px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.15);
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 13px;
            padding: 4px 14px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }

        /* ── Individual button ────────────────────────────────────────── */
        .btn {
            position: absolute;
            pointer-events: all;
            touch-action: none;
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 16px;
            opacity: 0.5;
            cursor: pointer;
            /* smooth drag movement */
            transition: background 0.1s;
        }
        .btn.drag-mode {
            /* slightly brighter border during drag phase */
            border-color: rgba(255,220,0,0.8);
            background: rgba(255,220,0,0.12);
        }
        .btn.drag-mode:active,
        .btn.drag-mode.dragging {
            opacity: 0.9;
            background: rgba(255,220,0,0.25);
        }
        .btn:not(.drag-mode):active {
            opacity: 1.0;
            background: rgba(255,255,255,0.35);
        }
    </style>
</head>
<body>

    <div id="player-wrapper">
        <div id="status" style="color:#fff;font-family:Arial;font-size:15px;
             text-align:center;padding:20px;width:100%;">
            Loading...
        </div>
    </div>

    <div id="dpad">
        <div class="btn" id="btn-up"    data-key="setUp">▲</div>
        <div class="btn" id="btn-down"  data-key="setDown">▼</div>
        <div class="btn" id="btn-left"  data-key="setLeft">◀</div>
        <div class="btn" id="btn-right" data-key="setRight">▶</div>
        <div class="btn" id="btn-space" data-key="setSpace" style="width:80px;">SPC</div>
        <div class="btn" id="btn-z"     data-key="setZ">Z</div>
        <div class="btn" id="btn-r"     data-key="setR">R</div>
        <div class="btn" id="btn-enter" data-key="setEnter" style="width:70px;">ETR</div>
    </div>

    <div id="drag-notice">✦ Drag buttons to reposition — locking in <span id="cd">15</span>s</div>

    <script>
        // ── Ruffle config ─────────────────────────────────────────────────
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            base: "./",
            allowedNetworking: "all",
            scale: "showAll",
            letterbox: "on",
            quality: "high",
            wmode: "direct",
            contextMenu: false,
            allowFullscreen: false
        };

        var player;
        var draggable = false;  // true during the 15s window
        var dragTimer  = null;
        var cdInterval = null;

        // ── Default positions (fallback if no saved data) ─────────────────
        var defaults = {
            "btn-up":    { x: 60,  y: 220 },
            "btn-down":  { x: 60,  y: 320 },
            "btn-left":  { x: 10,  y: 270 },
            "btn-right": { x: 110, y: 270 },
            "btn-space": { x: 780, y: 270 },
            "btn-z":     { x: 680, y: 270 },
            "btn-r":     { x: 780, y: 200 },
            "btn-enter": { x: 680, y: 200 }
        };

        // ── Save / load positions from localStorage ───────────────────────
        var STORAGE_KEY = "bfdia5b_btn_positions";

        function savePositions() {
            var data = {};
            var btns = document.querySelectorAll(".btn");
            for (var i = 0; i < btns.length; i++) {
                var b = btns[i];
                data[b.id] = {
                    x: parseInt(b.style.left)  || 0,
                    y: parseInt(b.style.top)   || 0
                };
            }
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch(e) {}
        }

        function loadPositions() {
            var data = null;
            try {
                var raw = localStorage.getItem(STORAGE_KEY);
                if (raw) data = JSON.parse(raw);
            } catch(e) {}

            var btns = document.querySelectorAll(".btn");
            for (var i = 0; i < btns.length; i++) {
                var b   = btns[i];
                var pos = (data && data[b.id]) ? data[b.id] : defaults[b.id];
                if (pos) {
                    b.style.left = pos.x + "px";
                    b.style.top  = pos.y + "px";
                }
            }
        }

        // ── AS2 bridge ────────────────────────────────────────────────────
        window.showDpad = function() {
            loadPositions();
            document.getElementById("dpad").style.display = "block";
            startDragPhase();
        };
        window.hideDpad = function() {
            document.getElementById("dpad").style.display = "none";
            endDragPhase();
        };

        function callAS(fn, val) {
            if (player) {
                try { player.callExternalInterface(fn, val); } catch(e) {}
            }
        }

        // ── Drag phase: 15 seconds after dpad appears ─────────────────────
        function startDragPhase() {
            draggable = true;
            var notice = document.getElementById("drag-notice");
            var cdEl   = document.getElementById("cd");
            notice.style.display = "block";
            var remaining = 15;
            cdEl.textContent = remaining;

            // Add yellow border class to all buttons
            var btns = document.querySelectorAll(".btn");
            for (var i = 0; i < btns.length; i++) {
                btns[i].classList.add("drag-mode");
            }

            cdInterval = setInterval(function() {
                remaining--;
                cdEl.textContent = remaining;
                if (remaining <= 0) endDragPhase();
            }, 1000);
        }

        function endDragPhase() {
            draggable = false;
            if (cdInterval) { clearInterval(cdInterval); cdInterval = null; }
            document.getElementById("drag-notice").style.display = "none";
            var btns = document.querySelectorAll(".btn");
            for (var i = 0; i < btns.length; i++) {
                btns[i].classList.remove("drag-mode");
            }
            savePositions();
        }

        // ── Touch handling ────────────────────────────────────────────────
        // Each touch is tracked separately so multitouch works correctly.
        // During drag phase  → move button
        // After drag phase   → send AS2 key down/up

        // touchId -> { type: "drag"|"key", btnEl, setter, startX, startY, origLeft, origTop }
        var touchRegistry = {};

        function bindButtons() {
            var btns = document.querySelectorAll(".btn");
            for (var i = 0; i < btns.length; i++) {
                (function(btn) {
                    var setter = btn.getAttribute("data-key");

                    btn.addEventListener("touchstart", function(e) {
                        e.preventDefault();
                        e.stopPropagation();

                        for (var t = 0; t < e.changedTouches.length; t++) {
                            var touch = e.changedTouches[t];
                            if (draggable) {
                                // Drag mode — record start info
                                touchRegistry[touch.identifier] = {
                                    type:     "drag",
                                    btnEl:    btn,
                                    startX:   touch.clientX,
                                    startY:   touch.clientY,
                                    origLeft: parseInt(btn.style.left) || 0,
                                    origTop:  parseInt(btn.style.top)  || 0
                                };
                                btn.classList.add("dragging");
                            } else {
                                // Game mode — send key down
                                touchRegistry[touch.identifier] = {
                                    type:   "key",
                                    setter: setter
                                };
                                callAS(setter, true);
                            }
                        }
                    }, {passive: false});

                    btn.addEventListener("touchmove", function(e) {
                        e.preventDefault();
                        for (var t = 0; t < e.changedTouches.length; t++) {
                            var touch = e.changedTouches[t];
                            var reg   = touchRegistry[touch.identifier];
                            if (reg && reg.type === "drag") {
                                var dx = touch.clientX - reg.startX;
                                var dy = touch.clientY - reg.startY;
                                var newLeft = reg.origLeft + dx;
                                var newTop  = reg.origTop  + dy;
                                // Clamp to screen bounds
                                var bw = reg.btnEl.offsetWidth;
                                var bh = reg.btnEl.offsetHeight;
                                newLeft = Math.max(0, Math.min(window.innerWidth  - bw, newLeft));
                                newTop  = Math.max(0, Math.min(window.innerHeight - bh, newTop));
                                reg.btnEl.style.left = newLeft + "px";
                                reg.btnEl.style.top  = newTop  + "px";
                            }
                        }
                    }, {passive: false});

                    btn.addEventListener("touchend", function(e) {
                        e.preventDefault();
                        for (var t = 0; t < e.changedTouches.length; t++) {
                            var touch = e.changedTouches[t];
                            var reg   = touchRegistry[touch.identifier];
                            if (reg) {
                                if (reg.type === "drag") {
                                    btn.classList.remove("dragging");
                                } else {
                                    callAS(reg.setter, false);
                                }
                                delete touchRegistry[touch.identifier];
                            }
                        }
                    }, {passive: false});

                    btn.addEventListener("touchcancel", function(e) {
                        e.preventDefault();
                        for (var t = 0; t < e.changedTouches.length; t++) {
                            var touch = e.changedTouches[t];
                            var reg   = touchRegistry[touch.identifier];
                            if (reg) {
                                if (reg.type === "drag") {
                                    btn.classList.remove("dragging");
                                } else {
                                    callAS(reg.setter, false);
                                }
                                delete touchRegistry[touch.identifier];
                            }
                        }
                    }, {passive: false});

                })(btns[i]);
            }
        }

        // ── Load Ruffle ───────────────────────────────────────────────────
        function initRuffle() {
            var ruffle  = window.RufflePlayer.newest();
            player      = ruffle.createPlayer();
            var wrapper = document.getElementById("player-wrapper");
            var status  = document.getElementById("status");
            if (status) wrapper.removeChild(status);
            wrapper.appendChild(player);
          player.load("5mobile.swf").catch(function(e) {
    wrapper.innerHTML =
        "<p style='color:#fff;padding:20px;text-align:center'>" +
        "Failed to load game.<br>" + e + "</p>";
});
bindButtons();

// Show dpad automatically after game loads
// Small delay to let Ruffle fully initialize
setTimeout(function() {
    loadPositions();
    document.getElementById("dpad").style.display = "block";
    startDragPhase();
}, 3000);
        }

        function tryFallback() {
            var s = document.createElement("script");
            s.src = "https://unpkg.com/@ruffle-rs/ruffle";
            s.onload = function() { setTimeout(initRuffle, 300); };
            s.onerror = function() {
                document.body.innerHTML =
                    "<p style='color:#fff;font-family:Arial;padding:30px;" +
                    "text-align:center'>Could not load Ruffle.</p>";
            };
            document.head.appendChild(s);
        }

        var localScript = document.createElement("script");
        localScript.src = "ruffle.js";
        localScript.onload = function() { setTimeout(initRuffle, 300); };
        localScript.onerror = tryFallback;
        document.head.appendChild(localScript);
    </script>

</body>
</html>
