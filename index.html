<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
    <title>BFDIA 5B</title>
    <style>
        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        html, body {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
        }
        #player-wrapper {
            position: relative;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        ruffle-player {
            display: block;
            width: 100%;
            height: 100%;
        }
        #dpad {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 999;
        }
        .btn {
            position: absolute;
            pointer-events: all;
            touch-action: none;
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 16px;
            opacity: 0.5;
            cursor: pointer;
        }
        .btn.drag-mode {
            border-color: rgba(255,220,0,0.8);
            background: rgba(255,220,0,0.12);
        }
        .btn:active {
            opacity: 1.0;
            background: rgba(255,255,255,0.35);
        }
        #update-btn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 60px;
            background: #ffffff;
            color: #000000;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            z-index: 9999;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="player-wrapper">
        <div id="status" style="color:#fff;font-family:Arial;font-size:15px;
             text-align:center;padding:20px;width:100%;">
            Loading...
        </div>
    </div>

    <div id="update-btn" onclick="doUpdate()">Update Game</div>

    <div id="dpad">
        <div class="btn" id="btn-up"    data-btn="up">&#9650;</div>
        <div class="btn" id="btn-down"  data-btn="down">&#9660;</div>
        <div class="btn" id="btn-left"  data-btn="left">&#9664;</div>
        <div class="btn" id="btn-right" data-btn="right">&#9654;</div>
        <div class="btn" id="btn-space" data-btn="space" style="width:80px;">SPC</div>
        <div class="btn" id="btn-z"     data-btn="z">Z</div>
        <div class="btn" id="btn-r"     data-btn="r">R</div>
        <div class="btn" id="btn-enter" data-btn="enter" style="width:70px;">ETR</div>
    </div>

    <script>

        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            base: "./",
            allowedNetworking: "all",
            scale: "showAll",
            letterbox: "on",
            quality: "high",
            wmode: "direct",
            contextMenu: false,
            allowFullscreen: false
        };

        var player     = null;
        var draggable  = false;
        var cdInterval = null;

        // Same host:port that served this page
        var SERVER = window.location.protocol + "//" + window.location.host;

        // Send button state to local server via XHR
        function sendBtn(name, val) {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", SERVER + "/btn?n=" + name + "&v=" + (val ? "1" : "0"), true);
            xhr.send();
        }

        // Default positions
        var defaults = {
            "btn-up":    { x: 60,  y: 220 },
            "btn-down":  { x: 60,  y: 320 },
            "btn-left":  { x: 10,  y: 270 },
            "btn-right": { x: 110, y: 270 },
            "btn-space": { x: 780, y: 270 },
            "btn-z":     { x: 680, y: 270 },
            "btn-r":     { x: 780, y: 200 },
            "btn-enter": { x: 680, y: 200 }
        };

        var STORAGE_KEY = "bfdia5b_btn_positions";

        function savePositions() {
            var data = {};
            var btns = document.querySelectorAll(".btn");
            for (var i = 0; i < btns.length; i++) {
                var b = btns[i];
                data[b.id] = {
                    x: parseInt(b.style.left) || 0,
                    y: parseInt(b.style.top)  || 0
                };
            }
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
        }

        function loadPositions() {
            var data = null;
            try {
                var raw = localStorage.getItem(STORAGE_KEY);
                if (raw) data = JSON.parse(raw);
            } catch(e) {}
            var btns = document.querySelectorAll(".btn");
            for (var i = 0; i < btns.length; i++) {
                var b   = btns[i];
                var pos = (data && data[b.id]) ? data[b.id] : defaults[b.id];
                if (pos) {
                    b.style.left = pos.x + "px";
                    b.style.top  = pos.y + "px";
                }
            }
        }

        function startDragPhase() {
            draggable = true;
            var remaining = 15;
            var btns = document.querySelectorAll(".btn");
            for (var i = 0; i < btns.length; i++) btns[i].classList.add("drag-mode");
            cdInterval = setInterval(function() {
                remaining--;
                if (remaining <= 0) endDragPhase();
            }, 1000);
        }

        function endDragPhase() {
            draggable = false;
            if (cdInterval) { clearInterval(cdInterval); cdInterval = null; }
            var btns = document.querySelectorAll(".btn");
            for (var i = 0; i < btns.length; i++) btns[i].classList.remove("drag-mode");
            savePositions();
        }

        function doUpdate() {
            var btn = document.getElementById("update-btn");
            btn.textContent = "Downloading...";
            btn.style.background = "#aaaaaa";
            btn.style.pointerEvents = "none";
            try {
                Android.triggerUpdate();
            } catch(e) {
                btn.textContent = "Failed!";
                btn.style.background = "#ff6666";
            }
        }

        var touchRegistry = {};

        function bindButtons() {
            var btns = document.querySelectorAll(".btn");
            for (var i = 0; i < btns.length; i++) {
                (function(btn) {
                    var btnName = btn.getAttribute("data-btn");

                    btn.addEventListener("touchstart", function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        for (var t = 0; t < e.changedTouches.length; t++) {
                            var touch = e.changedTouches[t];
                            touchRegistry[touch.identifier] = {
                                btnEl:    btn,
                                btnName:  btnName,
                                startX:   touch.clientX,
                                startY:   touch.clientY,
                                origLeft: parseInt(btn.style.left) || 0,
                                origTop:  parseInt(btn.style.top)  || 0,
                                isDrag:   false
                            };
                            sendBtn(btnName, true);
                        }
                    }, {passive: false});

                    btn.addEventListener("touchmove", function(e) {
                        e.preventDefault();
                        for (var t = 0; t < e.changedTouches.length; t++) {
                            var touch = e.changedTouches[t];
                            var reg   = touchRegistry[touch.identifier];
                            if (!reg) continue;
                            var dx   = touch.clientX - reg.startX;
                            var dy   = touch.clientY - reg.startY;
                            var dist = Math.sqrt(dx * dx + dy * dy);
                            if (draggable && dist > 10) {
                                if (!reg.isDrag) {
                                    reg.isDrag = true;
                                    sendBtn(reg.btnName, false);
                                }
                                var newLeft = reg.origLeft + dx;
                                var newTop  = reg.origTop  + dy;
                                var bw = reg.btnEl.offsetWidth;
                                var bh = reg.btnEl.offsetHeight;
                                newLeft = Math.max(0, Math.min(window.innerWidth  - bw, newLeft));
                                newTop  = Math.max(0, Math.min(window.innerHeight - bh, newTop));
                                reg.btnEl.style.left = newLeft + "px";
                                reg.btnEl.style.top  = newTop  + "px";
                            }
                        }
                    }, {passive: false});

                    btn.addEventListener("touchend", function(e) {
                        e.preventDefault();
                        for (var t = 0; t < e.changedTouches.length; t++) {
                            var touch = e.changedTouches[t];
                            var reg   = touchRegistry[touch.identifier];
                            if (!reg) continue;
                            if (!reg.isDrag) sendBtn(reg.btnName, false);
                            delete touchRegistry[touch.identifier];
                        }
                    }, {passive: false});

                    btn.addEventListener("touchcancel", function(e) {
                        e.preventDefault();
                        for (var t = 0; t < e.changedTouches.length; t++) {
                            var touch = e.changedTouches[t];
                            var reg   = touchRegistry[touch.identifier];
                            if (!reg) continue;
                            sendBtn(reg.btnName, false);
                            delete touchRegistry[touch.identifier];
                        }
                    }, {passive: false});

                })(btns[i]);
            }
        }

        function initRuffle() {
            var ruffle  = window.RufflePlayer.newest();
            player      = ruffle.createPlayer();
            var wrapper = document.getElementById("player-wrapper");
            var status  = document.getElementById("status");
            if (status) wrapper.removeChild(status);
            wrapper.appendChild(player);

            // Pass server port to AS2 as a flashvar so it knows where to poll
            player.load({
                url: "5mobile.swf",
                parameters: { serverPort: window.location.port }
            }).catch(function(e) {
                wrapper.innerHTML =
                    "<p style='color:#fff;padding:20px;text-align:center'>" +
                    "Failed to load game.<br>" + e + "</p>";
            });

            bindButtons();

            setTimeout(function() {
                var updateBtn = document.getElementById("update-btn");
                if (updateBtn) updateBtn.style.display = "none";
                loadPositions();
                document.getElementById("dpad").style.display = "block";
                startDragPhase();
            }, 10000);
        }

        function tryFallback() {
            var s = document.createElement("script");
            s.src = "https://unpkg.com/@ruffle-rs/ruffle";
            s.onload = function() { setTimeout(initRuffle, 300); };
            s.onerror = function() {
                document.body.innerHTML =
                    "<p style='color:#fff;font-family:Arial;padding:30px;" +
                    "text-align:center'>Could not load Ruffle.</p>";
            };
            document.head.appendChild(s);
        }

        var localScript = document.createElement("script");
        localScript.src = "ruffle.js";
        localScript.onload = function() { setTimeout(initRuffle, 300); };
        localScript.onerror = tryFallback;
        document.head.appendChild(localScript);

    </script>
</body>
</html>
